name: Tests
on: [push, pull_request]
jobs:
  gcc:
    name: "GCC 14 (C++20)"
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get install g++-14
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: make CXX=g++-14
  clang:
    name: "Clang 18 (C++20)"
    runs-on: ubuntu-latest
    steps:
      - name: "Install Clang"
        uses: egor-tensin/setup-clang@v1
        with:
          version: 18
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: make CXX=clang++
  cmake:
    name: "CMake (configure, build, ctest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure
      - run: cmake --install build --prefix "$PWD/prefix"
      - name: "Upload rendered screenshots"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            build/shot-*.png
            tests/render-out.png
          if-no-files-found: ignore
